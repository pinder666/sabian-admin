<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabian — Country Detail</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:     #050c1a;
      --panel:    #0a1428;
      --panel2:   #0d1a33;
      --border:   #152040;
      --accent:   #1a6fff;
      --dim:      #8aa0c0;
      --text:     #c8d8f0;
      --bright:   #e8f0ff;
      --critical: #dc2626;
      --warning:  #f59e0b;
      --elevated: #eab308;
      --stable:   #6b7280;
      --mono:     'Courier New', Consolas, monospace;
      --sans:     -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }

    body {
      background: var(--navy); color: var(--text);
      font-family: var(--sans); line-height: 1.5;
      -webkit-font-smoothing: antialiased; min-height: 100vh;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 52px;
      background: rgba(5,12,26,0.96); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--mono); font-size: 1rem; font-weight: 700;
      color: var(--bright); letter-spacing: 0.14em; text-transform: uppercase;
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 1.5rem; }
    .nav-badge { font-family: var(--mono); font-size: 0.7rem; color: var(--dim); letter-spacing: 0.08em; text-transform: uppercase; }
    #live-dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); margin-right: 6px; box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .mode-bar {
      position: fixed; top: 52px; left: 0; right: 0; z-index: 190;
      display: flex; align-items: center;
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 0 2rem; overflow-x: auto;
    }
    .mode-bar::-webkit-scrollbar { height: 0; }
    .mode-btn {
      background: none; border: none; cursor: pointer;
      padding: 0.75rem 1.25rem;
      font-family: var(--mono); font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--dim); border-bottom: 2px solid transparent;
      text-decoration: none; white-space: nowrap;
    }
    .mode-btn:hover { color: var(--text); }

    main {
      padding-top: 100px; padding-bottom: 3rem;
      max-width: 900px; margin: 0 auto;
      padding-left: 2rem; padding-right: 2rem;
    }

    .back-link {
      display: inline-block; margin-bottom: 0.5rem;
      font-family: var(--mono); font-size: 0.7rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--dim); text-decoration: none;
    }
    .back-link:hover { color: var(--accent); }

    /* HEADER */
    .country-header {
      margin-bottom: 0.75rem; padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .country-name-large {
      font-size: 1.6rem; font-weight: 700; color: var(--bright);
      letter-spacing: 0.02em; margin-bottom: 0.25rem;
    }
    .country-meta {
      font-family: var(--mono); font-size: 0.75rem; color: var(--dim);
      letter-spacing: 0.08em; text-transform: uppercase;
      display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: center;
    }
    .risk-badge {
      display: inline-block; padding: 2px 10px; border-radius: 3px;
      font-family: var(--mono); font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .risk-badge.critical { background: var(--critical); color: #fff; }
    .risk-badge.warning  { background: var(--warning);  color: #000; }
    .risk-badge.elevated { background: var(--elevated); color: #000; }
    .risk-badge.stable   { background: var(--stable);   color: #fff; }

    /* CONVERGENCE */
    .convergence-section {
      margin-bottom: 1rem; padding: 1rem 1.25rem;
      background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
    }
    .section-label {
      font-family: var(--mono); font-size: 0.68rem; color: var(--dim);
      letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.5rem;
    }
    .convergence-row {
      display: flex; align-items: baseline; gap: 1.25rem;
    }
    .convergence-number {
      font-family: var(--mono); font-size: 2.5rem; font-weight: 700;
    }
    .convergence-sentence {
      font-family: var(--mono); font-size: 0.82rem;
      color: var(--text); letter-spacing: 0.04em;
    }

    /* SPARKLINE */
    .sparkline-wrap {
      margin-top: 0.875rem; padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
    .sparkline-svg { width: 100%; height: 64px; display: block; }
    .sparkline-year {
      font-family: var(--mono); font-size: 0.6rem; color: var(--dim);
      letter-spacing: 0.08em; display: flex; justify-content: space-between;
      margin-top: 3px;
    }

    /* DOMAIN BARS */
    .domains-section { margin-bottom: 1.5rem; }
    .domain-row { margin-bottom: 1.25rem; }
    .domain-top {
      display: flex; align-items: center; gap: 1rem; margin-bottom: 0.3rem;
    }
    .domain-name {
      font-family: var(--mono); font-size: 0.75rem; font-weight: 600;
      color: var(--bright); letter-spacing: 0.06em; text-transform: uppercase;
      min-width: 170px;
    }
    .bar-track {
      flex: 1; height: 8px; background: var(--panel2);
      border-radius: 2px; overflow: hidden;
    }
    .bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    .bar-fill.critical { background: var(--critical); }
    .bar-fill.warning  { background: var(--warning); }
    .bar-fill.elevated { background: var(--elevated); }
    .bar-fill.stable   { background: var(--stable); }
    .domain-score {
      font-family: var(--mono); font-size: 0.78rem; font-weight: 700;
      color: var(--bright); min-width: 32px; text-align: right;
    }
    .domain-intelligence {
      font-family: var(--mono); font-size: 0.72rem; color: var(--dim);
      letter-spacing: 0.04em; padding-left: 170px;
    }
    .domains-toggle {
      display: block; width: 100%; margin-top: 0.25rem;
      background: none; border: 1px solid var(--border); border-radius: 3px;
      padding: 0.5rem; cursor: pointer;
      font-family: var(--mono); font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim);
    }
    .domains-toggle:hover { color: var(--accent); border-color: var(--accent); }
    .domains-more {
      font-family: var(--mono); font-size: 0.68rem; color: var(--dim);
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.5rem 0; text-align: center;
    }

    /* INTEL READ */
    .intel-section {
      margin-bottom: 1.5rem; padding: 1rem 1.25rem;
      background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
    }
    .intel-item {
      display: flex; gap: 1.25rem;
      padding-bottom: 0.625rem; margin-bottom: 0.625rem;
      border-bottom: 1px solid var(--border);
    }
    .intel-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .intel-num {
      font-family: var(--mono); font-size: 0.65rem; color: var(--dim);
      letter-spacing: 0.08em; min-width: 22px; padding-top: 1px;
    }
    .intel-text {
      font-family: var(--mono); font-size: 0.76rem; color: var(--text);
      letter-spacing: 0.04em; line-height: 1.5;
    }

    .status-msg {
      font-family: var(--mono); font-size: 0.8rem; color: var(--dim);
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 3rem 0; text-align: center;
    }
    .error-msg {
      font-family: var(--mono); font-size: 0.8rem; color: var(--critical);
      padding: 2rem 0;
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">SABIAN <span>INTELLIGENCE</span></a>
    <div class="nav-right">
      <span class="nav-badge"><span id="live-dot"></span>LIVE</span>
      <span class="nav-badge" id="nav-date"></span>
    </div>
  </nav>

  <div class="mode-bar">
    <a href="explore.html" class="mode-btn">EXPLORE</a>
    <a href="intel.html"   class="mode-btn">WATCHLIST</a>
    <a href="intel.html"   class="mode-btn">THREAT INTELLIGENCE</a>
    <a href="intel.html"   class="mode-btn">FAMINE RISK</a>
  </div>

  <main>
    <a href="javascript:history.back()" class="back-link">← BACK</a>
    <div id="country-header" class="country-header"></div>
    <div id="convergence-section"></div>
    <div id="intel-read"></div>
    <div id="domain-bars" class="domains-section"></div>
  </main>

  <script>
    document.getElementById('nav-date').textContent = new Date().toISOString().slice(0, 10);

    const DOMAIN_DISPLAY = {
      gdelt_conflict: 'Conflict', gdelt_conflict_feed: 'Conflict',
      unhcr_displacement: 'Displacement', unhcr_displacement_stock: 'Displacement',
      food_security: 'Food Security', ipc_food: 'Food Security',
      economic_stress: 'Economic Stress', fred_capital_feed: 'Economic Stress',
      structural_pressure: 'Structural Pressure',
      corruption_risk: 'Governance Risk', vdem_governance: 'Governance',
      election_calendar: 'Political Risk', election_calendar_feed: 'Political Risk',
      displacement: 'Displacement', conflict: 'Conflict',
      sanctions_pressure: 'Sanctions', sovereignty_risk: 'Sovereignty Risk',
      unhcr_refugees: 'Refugee Outflows',
      usda_food_supply: 'Food Supply',
      fao_food_import: 'Food Imports',
      satellite_fire: 'Fire Activity',
      tor_censorship: 'Internet Censorship',
      prediction_market: 'Forecast Sentiment',
      night_lights: 'Night-Time Economic Activity',
      dark_vessel: 'Maritime Anomalies',
      capital_flows: 'Capital Flows',
      chokepoint: 'Trade Chokepoint Exposure',
      climate_stress: 'Climate Stress',
      conflict_events: 'Conflict',
      currency_collapse: 'Currency Collapse',
      cyber_threat: 'Cyber Threat',
      energy_stress: 'Energy Stress',
      flood_risk: 'Flood Risk',
      governance: 'Governance',
      health_crisis: 'Health Crisis',
      internet_freedom: 'Information Access',
      maritime_trade: 'Maritime Trade',
      military_proximity: 'Military Activity',
      port_congestion: 'Port Activity',
      power_grid: 'Power Infrastructure',
      rail_corridor: 'Rail Infrastructure',
      resource_conflict: 'Resource Conflict',
      seismic_risk: 'Seismic Risk',
      social_volume: 'Social Volume',
      trade_collapse: 'Trade Disruption',
      water_stress: 'Water Stress',
    };

    // Fail-closed: unmapped keys return null — callers suppress, raw keys never render
    function shieldDomain(raw) {
      if (!raw) return null;
      return DOMAIN_DISPLAY[raw]
        || DOMAIN_DISPLAY[raw.toLowerCase().replace(/\s+/g, '_')]
        || null;
    }

    function getApiKey() {
      return localStorage.getItem('sabian_buyer_key') || '';
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function riskClass(level) {
      const l = (level || 'stable').toLowerCase();
      return ['critical','warning','elevated','stable'].includes(l) ? l : 'stable';
    }

    function scoreClass(score) {
      if (score >= 81) return 'critical';
      if (score >= 66) return 'warning';
      if (score >= 41) return 'elevated';
      return 'stable';
    }

    function riskColor(rc) {
      if (rc === 'critical') return 'var(--critical)';
      if (rc === 'warning')  return 'var(--warning)';
      if (rc === 'elevated') return 'var(--elevated)';
      return 'var(--dim)';
    }

    function riskHex(rc) {
      if (rc === 'critical') return '#dc2626';
      if (rc === 'warning')  return '#f59e0b';
      if (rc === 'elevated') return '#eab308';
      return '#6b7280';
    }

    function buildSparkline(history, hexColor) {
      if (history.length < 2) return '';
      const sorted = [...history].sort((a, b) =>
        (a.scan_date || '').localeCompare(b.scan_date || ''));
      const W = 800; const H = 60;
      const scores = sorted.map(h => h.score || h.convergence_score || 0);
      const minS   = Math.min(...scores);
      const maxS   = Math.max(...scores);
      const range  = maxS - minS || 1;
      const n      = sorted.length;
      const pts    = sorted.map((h, i) => {
        const x = (i / (n - 1)) * W;
        const y = H - (((h.score || h.convergence_score || 0) - minS) / range) * H;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ');
      const lastX = W;
      const lastY = +(H - ((scores[n - 1] - minS) / range) * H).toFixed(1);
      const firstYear = (sorted[0].scan_date || '').slice(0, 4);
      const lastYear  = (sorted[n - 1].scan_date || '').slice(0, 4);
      return `
        <div class="sparkline-wrap">
          <svg class="sparkline-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
            <polyline points="${pts}" fill="none" stroke="${hexColor}" stroke-width="2.5"
              stroke-linejoin="round" stroke-linecap="round"/>
            <circle cx="${lastX}" cy="${lastY}" r="5" fill="${hexColor}"/>
          </svg>
          <div class="sparkline-year"><span>${firstYear}</span><span>${lastYear}</span></div>
        </div>`;
    }

    async function apiFetch(url, opts) {
      const res = await fetch(url, opts || {});
      if (!res.ok) throw new Error(`${res.status}`);
      return res.json();
    }

    async function loadCountry() {
      const params  = new URLSearchParams(window.location.search);
      const country = params.get('country');
      if (!country) {
        document.getElementById('country-header').innerHTML =
          '<div class="error-msg">No country specified.</div>';
        return;
      }

      document.getElementById('country-header').innerHTML =
        `<div class="status-msg">Loading ${escapeHtml(country)}&hellip;</div>`;

      const key = getApiKey();

      const [threatsRes, histRes, compareRes] = await Promise.allSettled([
        apiFetch('/public-api/threats'),
        apiFetch(`/public-api/country/${encodeURIComponent(country)}?days=3650`),
        key
          ? apiFetch(`/api/country/compare/${encodeURIComponent(country)}`, {
              headers: { 'Authorization': `Bearer ${key}` }
            })
          : Promise.resolve(null)
      ]);

      const allCountries = threatsRes.status === 'fulfilled'
        ? (threatsRes.value.countries || []) : [];
      const current = allCountries.find(
        c => c.country.toLowerCase() === country.toLowerCase()
      ) || null;

      const history = histRes.status === 'fulfilled'
        ? (histRes.value.history || []) : [];

      const comparisons = compareRes.status === 'fulfilled' && compareRes.value
        ? (compareRes.value.comparisons || {}) : {};

      renderHeader(country, current);
      renderConvergence(current, history, comparisons, allCountries);
      renderDomains(current, comparisons);
      renderIntelRead(current, history, comparisons);
    }

    function renderHeader(country, current) {
      const rc       = riskClass(current?.risk_level);
      const theater  = current?.theater   || '';
      const scanDate = current?.scan_date || '';
      const ageYears = current?.data_age_years || 0;
      const freshness = ageYears > 0
        ? `Data ${ageYears}yr old` : 'Current';

      document.getElementById('country-header').innerHTML = `
        <div class="country-name-large">${escapeHtml(country)}</div>
        <div class="country-meta">
          <span class="risk-badge ${rc}">${escapeHtml(current?.risk_level || 'STABLE')}</span>
          ${theater  ? `<span>${escapeHtml(theater)}</span>`           : ''}
          ${scanDate ? `<span>Updated: ${escapeHtml(scanDate)}</span>` : ''}
          <span>${escapeHtml(freshness)}</span>
        </div>
      `;
    }

    function convergenceWidth(c) {
      return (c?.active_domains || []).filter(d => (d.score || 0) > 0).length;
    }

    function renderConvergence(current, history, comparisons, allCountries) {
      const score = current?.convergence_score || 0;
      const rc    = riskClass(current?.risk_level);

      // Rarity — world position computed live from the threats list
      let rarity = '';
      const width = convergenceWidth(current);
      if (width > 0 && (allCountries || []).length > 1) {
        const n = allCountries.filter(c => convergenceWidth(c) >= width).length;
        rarity = n === 1
          ? `The only country worldwide in convergence this wide — ${width} domains elevated.`
          : `One of ${n} countries worldwide in convergence this wide — ${width} domains elevated.`;
      }

      // Movement — 30d delta from history
      let movement = '';
      if (history.length >= 2) {
        const sorted = [...history].sort((a, b) =>
          (a.scan_date || '').localeCompare(b.scan_date || ''));
        const latest    = sorted[sorted.length - 1];
        const cutoff    = new Date();
        cutoff.setDate(cutoff.getDate() - 30);
        const cutoffStr = cutoff.toISOString().slice(0, 10);
        const past      = sorted.find(h => (h.scan_date || '') >= cutoffStr) || sorted[0];
        const nowScore  = latest.score || latest.convergence_score || 0;
        const pastScore = past.score   || past.convergence_score   || 0;
        const delta     = Math.round(nowScore - pastScore);
        if      (delta >  2) movement = `Risen ${delta} points in 30 days`;
        else if (delta < -2) movement = `Fallen ${Math.abs(delta)} points in 30 days`;
        else                 movement = 'Stable over 30 days';
      }

      // Attribution — decompose 30d movement by domain; unmapped domains omitted
      let attribution = '';
      const movers = Object.entries(comparisons || {})
        .map(([k, c]) => ({ k, d: typeof c.change_30d === 'number' ? c.change_30d : 0 }))
        .filter(m => Math.abs(m.d) > 2 && shieldDomain(m.k) !== null)
        .sort((a, b) => Math.abs(b.d) - Math.abs(a.d));
      const drivers = movers.filter(m => m.d > 0).slice(0, 2);
      const offsets = movers.filter(m => m.d < 0).slice(0, 1);
      if (movement && drivers.length) {
        attribution = ` — driven by ${drivers.map(m => `${shieldDomain(m.k)} (+${m.d})`).join(' and ')}`;
        if (offsets.length) attribution += `, offset by ${shieldDomain(offsets[0].k)} (${offsets[0].d})`;
      }

      const sentence = [rarity, movement ? movement + attribution + '.' : '']
        .filter(Boolean).join(' ');

      document.getElementById('convergence-section').innerHTML = `
        <div class="convergence-section">
          <div class="section-label">Convergence</div>
          <div class="convergence-row">
            <span class="convergence-number" style="color:${riskColor(rc)}">${score}</span>
            ${sentence ? `<span class="convergence-sentence">${escapeHtml(sentence)}</span>` : ''}
          </div>
          ${buildSparkline(history, riskHex(rc))}
        </div>
      `;
    }

    function renderDomains(current, comparisons) {
      const domains = (current?.active_domains || [])
        .filter(d => (d.score || 0) > 0)
        .sort((a, b) => (b.score || 0) - (a.score || 0));

      const el = document.getElementById('domain-bars');

      if (domains.length === 0) {
        el.innerHTML = '<div class="status-msg">No domain data.</div>';
        return;
      }

      const named    = domains.filter(d => shieldDomain(d.name) !== null);
      const withheld = domains.length - named.length;

      el.innerHTML = `<div class="section-label">Active Domains</div>`;

      const VISIBLE = 5;

      named.forEach((d, i) => {
        const display = shieldDomain(d.name);
        const score   = d.score || 0;
        const sc      = scoreClass(score);
        const cmp     = comparisons[d.name] || {};
        const parts   = [cmp.historical_max_label, cmp.change_30d_label].filter(Boolean);
        const intel   = parts.join(' · ');

        const row = document.createElement('div');
        row.className = 'domain-row';
        row.innerHTML = `
          <div class="domain-top">
            <span class="domain-name">${escapeHtml(display)}</span>
            <div class="bar-track">
              <div class="bar-fill ${sc}" style="width:${score}%"></div>
            </div>
            <span class="domain-score">${score}</span>
          </div>
          ${intel ? `<div class="domain-intelligence">${escapeHtml(intel)}</div>` : ''}
        `;
        if (i >= VISIBLE) row.style.display = 'none';
        el.appendChild(row);
      });

      if (named.length > VISIBLE) {
        const btn = document.createElement('button');
        btn.className = 'domains-toggle';
        btn.textContent = `SHOW ALL ${named.length} DOMAINS`;
        btn.onclick = () => {
          const rows = el.querySelectorAll('.domain-row');
          const hidden = rows[VISIBLE].style.display === 'none';
          rows.forEach((r, i) => { if (i >= VISIBLE) r.style.display = hidden ? '' : 'none'; });
          btn.textContent = hidden ? 'SHOW TOP 5 ONLY' : `SHOW ALL ${named.length} DOMAINS`;
        };
        el.appendChild(btn);
      }

      if (withheld > 0) {
        const more = document.createElement('div');
        more.className = 'domains-more';
        more.textContent = `+${withheld} ADDITIONAL ELEVATED DOMAIN${withheld === 1 ? '' : 'S'}`;
        el.appendChild(more);
      }
    }

    function renderIntelRead(current, history, comparisons) {
      const el = document.getElementById('intel-read');
      if (!getApiKey() || Object.keys(comparisons).length === 0) { el.innerHTML = ''; return; }

      const items   = [];
      const domains = (current?.active_domains || [])
        .filter(d => (d.score || 0) > 0)
        .sort((a, b) => (b.score || 0) - (a.score || 0));

      // 1. Domain count — cross-domain synthesis not visible in individual bars
      if (domains.length > 1) {
        const top3 = domains.slice(0, 3).map(d => shieldDomain(d.name)).filter(Boolean).join(', ');
        items.push(`${domains.length} domains elevated simultaneously.${top3 ? ` Primary: ${top3}.` : ''}`);
      }

      // 2. Top domain with historical context — omitted entirely if unmapped
      const top = domains[0];
      if (top && shieldDomain(top.name) !== null) {
        const cmp = comparisons[top.name] || {};
        if (cmp.historical_max_label) {
          items.push(`${shieldDomain(top.name)} is the primary driver at ${top.score} — ${cmp.historical_max_label}.`);
        }
      }

      // 3. Fastest 30d mover — omitted (never substituted) if its domain is unmapped
      let fastestDk = null, fastestAbs = 0;
      Object.entries(comparisons).forEach(([dk, cmp]) => {
        const abs = typeof cmp.change_30d === 'number' ? Math.abs(cmp.change_30d) : 0;
        if (abs > fastestAbs) { fastestAbs = abs; fastestDk = dk; }
      });
      if (fastestDk && fastestAbs > 2 && shieldDomain(fastestDk) !== null) {
        const cmp = comparisons[fastestDk];
        const dir = (cmp.change_30d || 0) > 0 ? 'risen' : 'fallen';
        items.push(`Fastest move: ${shieldDomain(fastestDk)} has ${dir} ${fastestAbs} points in 30 days.`);
      }

      // 4. Band entry year — when score first reached this risk level in history
      const rc        = riskClass(current?.risk_level);
      const threshold = { critical: 81, warning: 66, elevated: 41 }[rc];
      if (threshold && history.length >= 2) {
        const sorted     = [...history].sort((a, b) =>
          (a.scan_date || '').localeCompare(b.scan_date || ''));
        const firstAbove = sorted.find(h => (h.score || h.convergence_score || 0) >= threshold);
        if (firstAbove) {
          const year  = (firstAbove.scan_date || '').slice(0, 4);
          const level = (current?.risk_level || '').toUpperCase();
          items.push(`Score at ${level} level since ${year}.`);
        }
      }

      if (items.length === 0) { el.innerHTML = ''; return; }

      el.innerHTML = `
        <div class="intel-section">
          <div class="section-label">Intelligence</div>
          ${items.map((text, i) => `
            <div class="intel-item">
              <span class="intel-num">0${i + 1}</span>
              <span class="intel-text">${escapeHtml(text)}</span>
            </div>`).join('')}
        </div>`;
    }

    loadCountry();
  </script>

</body>
</html>
