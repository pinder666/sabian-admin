<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabian — Explore</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:     #050c1a;
      --panel:    #0a1428;
      --panel2:   #0d1a33;
      --border:   #152040;
      --accent:   #1a6fff;
      --dim:      #8aa0c0;
      --text:     #c8d8f0;
      --bright:   #e8f0ff;
      --critical: #dc2626;
      --warning:  #f59e0b;
      --elevated: #eab308;
      --stable:   #6b7280;
      --mono:     'Courier New', 'Consolas', monospace;
      --sans:     -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--navy);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem;
      height: 52px;
      background: rgba(5,12,26,0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--mono); font-size: 1rem; font-weight: 700;
      color: var(--bright); letter-spacing: 0.14em; text-transform: uppercase;
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 1.5rem; }
    .nav-badge {
      font-family: var(--mono); font-size: 0.7rem; color: var(--dim);
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    #live-dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); margin-right: 6px;
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* MODE TABS */
    .mode-bar {
      position: fixed; top: 52px; left: 0; right: 0; z-index: 190;
      display: flex; align-items: center; gap: 0;
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      overflow-x: auto;
    }
    .mode-bar::-webkit-scrollbar { height: 0; }
    .mode-btn {
      background: none; border: none; cursor: pointer;
      padding: 0.75rem 1.25rem;
      font-family: var(--mono); font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--dim); border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
      text-decoration: none;
    }
    .mode-btn:hover { color: var(--text); }
    .mode-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* MAIN */
    main {
      padding-top: 110px;
      padding-bottom: 3rem;
      max-width: 1400px;
      margin: 0 auto;
      padding-left: 2rem;
      padding-right: 2rem;
    }

    /* FILTER BAR */
    .filter-bar {
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    .filter-input {
      background: var(--panel2); border: 1px solid var(--border);
      color: var(--text); padding: 8px 12px; border-radius: 4px;
      font-family: var(--mono); font-size: 0.8rem;
      letter-spacing: 0.06em; outline: none; width: 180px;
    }
    .filter-input:focus { border-color: var(--accent); }
    .filter-input::placeholder { color: var(--dim); text-transform: uppercase; }
    .filter-select {
      background: var(--panel2); border: 1px solid var(--border);
      color: var(--text); padding: 8px 12px; border-radius: 4px;
      font-family: var(--mono); font-size: 0.8rem;
      letter-spacing: 0.06em; cursor: pointer; outline: none;
    }
    .filter-select:hover { border-color: var(--accent); }
    .filter-btn {
      background: var(--panel2); border: 1px solid var(--border);
      color: var(--dim); padding: 8px 14px; border-radius: 4px;
      font-family: var(--mono); font-size: 0.72rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-label {
      font-family: var(--mono); font-size: 0.7rem; color: var(--dim);
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .filter-check {
      display: flex; align-items: center; gap: 0.5rem;
      font-family: var(--mono); font-size: 0.72rem; color: var(--dim);
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer;
    }
    .filter-check input {
      accent-color: var(--accent);
      width: 14px; height: 14px;
      cursor: pointer;
    }

    /* SUMMARY STATS */
    .summary-bar {
      display: flex; align-items: center; gap: 2rem; flex-wrap: wrap;
      margin-bottom: 1.5rem;
      font-family: var(--mono); font-size: 0.75rem;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .summary-total { color: var(--bright); font-weight: 700; }
    .summary-stat { display: flex; align-items: center; gap: 0.5rem; }
    .stat-dot { width: 10px; height: 10px; border-radius: 2px; }
    .stat-dot.critical { background: var(--critical); }
    .stat-dot.warning { background: var(--warning); }
    .stat-dot.elevated { background: var(--elevated); }
    .stat-dot.stable { background: var(--stable); }

    /* BAND SECTIONS */
    .band-section { margin-bottom: 1.5rem; }
    .band-header {
      font-family: var(--mono); font-size: 0.8rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.25rem;
    }
    .band-header.critical { color: var(--critical); }
    .band-header.warning { color: var(--warning); }
    .band-header.elevated { color: var(--elevated); }
    .band-header.stable { color: var(--stable); }
    .band-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.25rem 0;
    }

    /* COUNTRY ROWS */
    .country-row {
      display: grid;
      grid-template-columns: 200px 90px 1fr 70px 70px;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 3px;
    }
    .country-row:hover { background: var(--panel); }
    .country-name {
      font-weight: 600; color: var(--bright);
      font-size: 0.9rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .level-badge {
      display: inline-block; padding: 3px 8px; border-radius: 3px;
      font-family: var(--mono); font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      text-align: center;
    }
    .level-badge.critical { background: rgba(220,38,38,0.15); color: var(--critical); border: 1px solid rgba(220,38,38,0.3); }
    .level-badge.warning { background: rgba(245,158,11,0.12); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
    .level-badge.elevated { background: rgba(234,179,8,0.1); color: var(--elevated); border: 1px solid rgba(234,179,8,0.3); }
    .level-badge.stable { background: rgba(107,114,128,0.1); color: var(--stable); border: 1px solid rgba(107,114,128,0.3); }

    /* INTENSITY BAR */
    .intensity-wrap {
      display: flex; align-items: center; gap: 10px;
    }
    .intensity-track {
      flex: 1; height: 16px; background: var(--border); border-radius: 3px;
      overflow: hidden;
    }
    .intensity-fill {
      height: 100%; border-radius: 3px;
      transition: width 0.3s ease-out;
    }
    .intensity-fill.critical { background: linear-gradient(90deg, var(--critical), #ef4444); }
    .intensity-fill.warning { background: linear-gradient(90deg, var(--warning), #fbbf24); }
    .intensity-fill.elevated { background: linear-gradient(90deg, var(--elevated), #facc15); }
    .intensity-fill.stable { background: linear-gradient(90deg, var(--stable), #9ca3af); }

    /* DOMAIN COUNT */
    .domain-count {
      font-family: var(--mono); font-size: 0.75rem;
      color: var(--dim); text-align: center;
    }

    /* TREND */
    .trend {
      font-family: var(--mono); font-size: 0.75rem;
      text-align: center;
    }
    .trend.rising { color: var(--critical); }
    .trend.flat { color: var(--dim); }
    .trend.falling { color: #22c55e; }

    /* EMPTY STATE */
    .empty-msg {
      font-family: var(--mono); font-size: 0.85rem; color: var(--dim);
      text-align: center; padding: 3rem;
    }

    /* STABLE COLLAPSE */
    .stable-toggle {
      font-family: var(--mono); font-size: 0.75rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--dim);
      padding: 0.75rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-top: 0.5rem;
      transition: border-color 0.2s;
    }
    .stable-toggle:hover { border-color: var(--accent); color: var(--text); }
    .stable-content { display: none; }
    .stable-content.expanded { display: block; }

    /* EXPORT BAR */
    .export-bar {
      margin-top: 2rem;
      display: flex; justify-content: flex-end;
    }

    /* DAILY READ */
    .daily-read {
      margin-bottom: 1.5rem;
      padding: 1rem 1.25rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 4px;
      font-family: var(--mono); font-size: 0.78rem;
      letter-spacing: 0.05em; line-height: 1.8;
    }
    .daily-read-header {
      font-size: 0.68rem; color: var(--dim);
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .daily-read-item { color: var(--text); margin-bottom: 0.3rem; }
    .daily-read-item .country-ref { color: var(--accent); cursor: pointer; }
    .daily-read-item .country-ref:hover { text-decoration: underline; }
    .daily-read-annex { margin-top: 0.5rem; color: var(--dim); font-size: 0.72rem; }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">SABIAN <span>INTELLIGENCE</span></a>
    <div class="nav-right">
      <span class="nav-badge"><span id="live-dot"></span>LIVE</span>
      <span class="nav-badge" id="nav-date"></span>
    </div>
  </nav>

  <div class="mode-bar">
    <a href="explore.html" class="mode-btn active">EXPLORE</a>
    <a href="intel.html" class="mode-btn">WATCHLIST</a>
    <a href="intel.html" class="mode-btn">THREAT INTELLIGENCE</a>
    <a href="intel.html" class="mode-btn">FAMINE RISK</a>
  </div>

  <main>
    <div class="filter-bar">
      <input class="filter-input" id="search-input" type="text" placeholder="SEARCH COUNTRY" oninput="render()">
      <select class="filter-select" id="filter-level" onchange="render()">
        <option value="">ALL LEVELS</option>
      </select>
      <select class="filter-select" id="filter-region" onchange="render()">
        <option value="">ALL REGIONS</option>
      </select>
      <label class="filter-check">
        <input type="checkbox" id="filter-portfolio" onchange="render()">
        MY PORTFOLIO ONLY
      </label>
      <button class="filter-btn" onclick="clearFilters()">CLEAR</button>
    </div>

    <div class="daily-read" id="daily-read" style="display:none"></div>
    <div class="summary-bar" id="summary-bar"></div>

    <div id="results"></div>

    <div class="export-bar">
      <button class="filter-btn" onclick="exportCSV()">EXPORT CSV</button>
    </div>
  </main>

  <script>
    // Shared state
    window.SABIAN = window.SABIAN || {
      activeCountry: null,
      activeYear: null,
      activeDomain: null,
      activeRegion: null,
      compareList: [],
      portfolio: JSON.parse(localStorage.getItem('sabian_portfolio') || '[]'),
      filters: { level: '', region: '' }
    };

    let allCountries = [];
    let maxScore = 100;

    function getApiKey() {
      return localStorage.getItem('sabian_buyer_key') || '';
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('nav-date').textContent = new Date().toISOString().slice(0, 10);
      loadData();
    });

    async function loadData() {
      try {
        const res = await fetch('/public-api/threats');
        const data = await res.json();
        allCountries = data.countries || [];

        // Find max convergence score for bar scaling
        maxScore = Math.max(...allCountries.map(c => c.convergence_score || c.score || 0), 100);

        // Populate filter dropdowns from live data
        populateFilters();
        render();
        loadDailyRead();
      } catch (err) {
        document.getElementById('results').innerHTML =
          `<div class="empty-msg">ERROR LOADING DATA: ${escapeHtml(err.message)}</div>`;
      }
    }

    function populateFilters() {
      const levels = new Set();
      const regions = new Set();

      allCountries.forEach(c => {
        if (c.risk_level) levels.add(c.risk_level);
        if (c.theater) regions.add(c.theater);
      });

      const levelSelect = document.getElementById('filter-level');
      [...levels].sort().forEach(level => {
        const opt = document.createElement('option');
        opt.value = level;
        opt.textContent = level;
        levelSelect.appendChild(opt);
      });

      const regionSelect = document.getElementById('filter-region');
      [...regions].sort().forEach(region => {
        const opt = document.createElement('option');
        opt.value = region;
        opt.textContent = region;
        regionSelect.appendChild(opt);
      });
    }

    function getFilteredCountries() {
      const search = (document.getElementById('search-input').value || '').toLowerCase().trim();
      const levelFilter = document.getElementById('filter-level').value;
      const regionFilter = document.getElementById('filter-region').value;
      const portfolioOnly = document.getElementById('filter-portfolio').checked;
      const portfolio = window.SABIAN.portfolio || [];

      return allCountries.filter(c => {
        if (search && !(c.country || '').toLowerCase().includes(search)) return false;
        if (levelFilter && c.risk_level !== levelFilter) return false;
        if (regionFilter && c.theater !== regionFilter) return false;
        if (portfolioOnly && !portfolio.includes(c.country)) return false;
        return true;
      });
    }

    function render() {
      const filtered = getFilteredCountries();
      const portfolio = window.SABIAN.portfolio || [];

      // Count by band
      const bands = ['CRITICAL', 'WARNING', 'ELEVATED', 'STABLE'];
      const counts = {};
      bands.forEach(b => counts[b] = { total: 0, exposure: 0 });

      filtered.forEach(c => {
        const band = (c.risk_level || 'STABLE').toUpperCase();
        if (counts[band]) {
          counts[band].total++;
          if (portfolio.includes(c.country)) counts[band].exposure++;
        }
      });

      // Render summary bar
      const totalCountries = filtered.length;
      const summaryHtml = `
        <span class="summary-total">${totalCountries} COUNTRIES</span>
        <span class="summary-stat"><span class="stat-dot critical"></span>${counts.CRITICAL.total} CRITICAL</span>
        <span class="summary-stat"><span class="stat-dot warning"></span>${counts.WARNING.total} WARNING</span>
        <span class="summary-stat"><span class="stat-dot elevated"></span>${counts.ELEVATED.total} ELEVATED</span>
        <span class="summary-stat"><span class="stat-dot stable"></span>${counts.STABLE.total} STABLE</span>
      `;
      document.getElementById('summary-bar').innerHTML = summaryHtml;

      // Group by band, portfolio first within each
      const grouped = {};
      bands.forEach(b => grouped[b] = { portfolio: [], other: [] });

      filtered.forEach(c => {
        const band = (c.risk_level || 'STABLE').toUpperCase();
        if (grouped[band]) {
          if (portfolio.includes(c.country)) {
            grouped[band].portfolio.push(c);
          } else {
            grouped[band].other.push(c);
          }
        }
      });

      // Sort within groups by convergence score descending
      const sortByScore = (a, b) => (b.convergence_score || b.score || 0) - (a.convergence_score || a.score || 0);
      bands.forEach(b => {
        grouped[b].portfolio.sort(sortByScore);
        grouped[b].other.sort(sortByScore);
      });

      // Render
      let html = '';

      bands.forEach(band => {
        const bandData = grouped[band];
        const total = bandData.portfolio.length + bandData.other.length;
        if (total === 0) return;

        const exposure = bandData.portfolio.length;
        const bandClass = band.toLowerCase();

        // For STABLE, collapse by default
        if (band === 'STABLE' && total > 0) {
          html += `
            <div class="band-section">
              <div class="stable-toggle" onclick="toggleStable()">
                <span>${band} — ${exposure > 0 ? exposure + ' EXPOSURE / ' : ''}${total} TOTAL</span>
                <span id="stable-arrow">▼</span>
              </div>
              <div class="stable-content" id="stable-content">
          `;

          if (bandData.portfolio.length > 0) {
            bandData.portfolio.forEach(c => { html += renderRow(c, bandClass); });
            if (bandData.other.length > 0) {
              html += '<hr class="band-divider">';
            }
          }
          bandData.other.forEach(c => { html += renderRow(c, bandClass); });

          html += `</div></div>`;
        } else {
          html += `
            <div class="band-section">
              <div class="band-header ${bandClass}">${band} — ${exposure > 0 ? exposure + ' EXPOSURE / ' : ''}${total} TOTAL</div>
          `;

          if (bandData.portfolio.length > 0) {
            bandData.portfolio.forEach(c => { html += renderRow(c, bandClass); });
            if (bandData.other.length > 0) {
              html += '<hr class="band-divider">';
            }
          }
          bandData.other.forEach(c => { html += renderRow(c, bandClass); });

          html += '</div>';
        }
      });

      if (html === '') {
        html = '<div class="empty-msg">NO COUNTRIES MATCH FILTERS</div>';
      }

      document.getElementById('results').innerHTML = html;
    }

    function renderRow(c, bandClass) {
      const score = c.convergence_score || c.score || 0;
      const width = maxScore > 0 ? (score / maxScore) * 100 : 0;

      // Domain count: active domains with score > 0 / total available (if known)
      const activeDomains = (c.active_domains || []).filter(d => (d.score || 0) > 0).length;
      const totalDomains = c.signals_available || null;
      const domainCount = totalDomains ? `${activeDomains}/${totalDomains}` : `${activeDomains}`;

      // Trend
      const trajectory = c.trajectory || 'STABLE';
      let trendDisplay = '── Flat';
      let trendClass = 'flat';
      if (trajectory === 'RISING') {
        trendDisplay = '▲ Rising';
        trendClass = 'rising';
      } else if (trajectory === 'SHARP_FALL') {
        trendDisplay = '▼ Falling';
        trendClass = 'falling';
      }

      return `
        <div class="country-row" onclick="openCountry('${escapeHtml(c.country)}')">
          <div class="country-name">${escapeHtml(c.country)}</div>
          <span class="level-badge ${bandClass}">${c.risk_level || 'STABLE'}</span>
          <div class="intensity-wrap">
            <div class="intensity-track">
              <div class="intensity-fill ${bandClass}" style="width: ${width}%"></div>
            </div>
          </div>
          <div class="domain-count">${domainCount}</div>
          <div class="trend ${trendClass}">${trendDisplay}</div>
        </div>
      `;
    }

    function toggleStable() {
      const content = document.getElementById('stable-content');
      const arrow = document.getElementById('stable-arrow');
      if (content.classList.contains('expanded')) {
        content.classList.remove('expanded');
        arrow.textContent = '▼';
      } else {
        content.classList.add('expanded');
        arrow.textContent = '▲';
      }
    }

    function openCountry(country) {
      window.SABIAN.activeCountry = country;
      window.location.href = `intel.html?country=${encodeURIComponent(country)}`;
    }

    function clearFilters() {
      document.getElementById('search-input').value = '';
      document.getElementById('filter-level').value = '';
      document.getElementById('filter-region').value = '';
      document.getElementById('filter-portfolio').checked = false;
      render();
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    async function loadDailyRead() {
      const key = getApiKey();
      if (!key) return;
      try {
        const res = await fetch('/api/explore/read', {
          headers: { 'Authorization': `Bearer ${key}` }
        });
        if (!res.ok) return;
        const data = await res.json();
        renderDailyRead(data);
      } catch (err) { /* silently skip — section stays hidden */ }
    }

    function renderDailyRead(data) {
      const el = document.getElementById('daily-read');
      if (!data || !data.items || data.items.length === 0) {
        if (data && data.nstr_text) {
          el.innerHTML = `<div class="daily-read-header">DAILY READ — ${escapeHtml(data.date)}</div>
            <div class="daily-read-item" style="color:var(--dim)">${escapeHtml(data.nstr_text)}</div>`;
          el.style.display = '';
        }
        return;
      }
      const itemsHtml = data.items.map(item => {
        let text = escapeHtml(item.text);
        for (const country of (item.countries || [])) {
          const safe = escapeHtml(country);
          text = text.replace(new RegExp(safe, 'g'),
            `<span class="country-ref" onclick="window.location='intel.html?country=${encodeURIComponent(country)}'">${safe}</span>`);
        }
        return `<div class="daily-read-item">${text}</div>`;
      }).join('');
      const annexHtml = data.annex_count > 0
        ? `<div class="daily-read-annex">+ ${data.annex_count} more items in annex</div>`
        : '';
      el.innerHTML = `
        <div class="daily-read-header">DAILY READ — ${escapeHtml(data.date)}</div>
        ${itemsHtml}${annexHtml}
      `;
      el.style.display = '';
    }

    function exportCSV() {
      const filtered = getFilteredCountries();
      const portfolio = window.SABIAN.portfolio || [];

      // Sort by band then by score
      const bandOrder = { 'CRITICAL': 0, 'WARNING': 1, 'ELEVATED': 2, 'STABLE': 3 };
      filtered.sort((a, b) => {
        const bandA = bandOrder[(a.risk_level || 'STABLE').toUpperCase()] || 3;
        const bandB = bandOrder[(b.risk_level || 'STABLE').toUpperCase()] || 3;
        if (bandA !== bandB) return bandA - bandB;
        return (b.convergence_score || b.score || 0) - (a.convergence_score || a.score || 0);
      });

      const timestamp = new Date().toISOString();
      const lines = [
        '# SABIAN INTELLIGENCE',
        `# GENERATED: ${timestamp}`,
        '# EXPLORE VIEW',
        'Country,Level,Intensity,Active Domains,Total Domains,Trend,In Portfolio'
      ];

      filtered.forEach(c => {
        const score = c.convergence_score || c.score || 0;
        const activeDomains = (c.active_domains || []).filter(d => (d.score || 0) > 0).length;
        const totalDomains = c.signals_available || null;
        const trajectory = c.trajectory || 'flat';
        const inPortfolio = portfolio.includes(c.country) ? 'Yes' : 'No';

        lines.push(`${c.country},${c.risk_level || 'STABLE'},${score},${activeDomains},${totalDomains || ''},${trajectory},${inPortfolio}`);
      });

      const csv = lines.join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `sabian_explore_${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>

</body>
</html>
