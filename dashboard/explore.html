<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabian — Explore</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:     #050c1a;
      --panel:    #0a1428;
      --panel2:   #0d1a33;
      --border:   #152040;
      --accent:   #1a6fff;
      --dim:      #8aa0c0;
      --text:     #c8d8f0;
      --bright:   #e8f0ff;
      --critical: #dc2626;
      --warning:  #f59e0b;
      --elevated: #eab308;
      --stable:   #6b7280;
      --mono:     'Courier New', 'Consolas', monospace;
      --sans:     -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--navy);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── NAV ─────────────────────────────────────────────────────────────── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem;
      height: 52px;
      background: rgba(5,12,26,0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--mono); font-size: 1rem; font-weight: 700;
      color: var(--bright); letter-spacing: 0.14em; text-transform: uppercase;
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 1.5rem; }
    .nav-badge {
      font-family: var(--mono); font-size: 0.7rem; color: var(--dim);
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    #live-dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: var(--stable); margin-right: 6px;
      box-shadow: 0 0 6px var(--stable);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── MODE TABS ───────────────────────────────────────────────────────── */
    .mode-bar {
      position: fixed; top: 52px; left: 0; right: 0; z-index: 190;
      display: flex; align-items: center; gap: 0;
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      overflow-x: auto;
    }
    .mode-bar::-webkit-scrollbar { height: 0; }
    .mode-btn {
      background: none; border: none; cursor: pointer;
      padding: 0.75rem 1.25rem;
      font-family: var(--mono); font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--dim); border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
      text-decoration: none;
    }
    .mode-btn:hover { color: var(--text); }
    .mode-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── MAIN CONTENT ────────────────────────────────────────────────────── */
    main {
      padding-top: 110px;
      padding-bottom: 3rem;
      max-width: 1600px;
      margin: 0 auto;
      padding-left: 1.5rem;
      padding-right: 1.5rem;
    }

    /* ── FILTER BAR ──────────────────────────────────────────────────────── */
    .filter-bar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .filter-row {
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    }
    .filter-group {
      display: flex; align-items: center; gap: 0.5rem;
    }
    .filter-label {
      font-family: var(--mono); font-size: 0.65rem;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim);
    }
    .ctrl-select {
      background: var(--panel2); border: 1px solid var(--border);
      color: var(--text); padding: 6px 12px; border-radius: 4px;
      font-size: 0.8rem; font-family: var(--sans);
      outline: none; cursor: pointer;
    }
    .ctrl-select:hover { border-color: var(--accent); }
    .ctrl-btn {
      background: var(--panel2); border: 1px solid var(--border);
      color: var(--dim); padding: 6px 14px; border-radius: 4px;
      font-family: var(--mono); font-size: 0.72rem;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .ctrl-btn:hover { border-color: var(--accent); color: var(--text); }

    /* ── SUMMARY BAR ─────────────────────────────────────────────────────── */
    .summary-bar {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    .summary-cell {
      background: var(--panel); padding: 0.9rem 1.2rem;
      text-align: center;
    }
    .summary-value {
      font-family: var(--mono); font-size: 1.5rem; font-weight: 700; color: var(--bright);
    }
    .summary-value.critical { color: var(--critical); }
    .summary-value.warning  { color: var(--warning); }
    .summary-value.elevated { color: var(--elevated); }
    .summary-value.stable   { color: var(--stable); }
    .summary-label {
      font-family: var(--mono); font-size: 0.62rem;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim);
      margin-top: 4px;
    }
    .summary-icon {
      display: inline-block; margin-right: 4px;
    }
    .summary-icon.critical { color: var(--critical); }
    .summary-icon.warning  { color: var(--warning); }
    .summary-icon.elevated { color: var(--elevated); }
    .summary-icon.stable   { color: var(--stable); }

    /* ── RESULTS TABLE ───────────────────────────────────────────────────── */
    .section-hdr {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .section-title {
      font-family: var(--mono); font-size: 0.75rem;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent);
    }
    .section-meta { font-size: 0.72rem; color: var(--dim); }

    .results-table { width: 100%; border-collapse: collapse; }
    .results-table th {
      padding: 0.5rem 0.75rem;
      font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--dim); text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap; cursor: pointer; user-select: none;
    }
    .results-table th:hover { color: var(--text); }
    .results-table th.sorted { color: var(--accent); }
    .results-table td {
      padding: 0.65rem 0.75rem; border-bottom: 1px solid rgba(21,32,64,0.5);
      font-size: 0.82rem; vertical-align: top;
    }
    .results-table tr:hover td { background: rgba(26,111,255,0.04); }
    .results-table tr { cursor: pointer; }

    .country-name {
      font-weight: 600; color: var(--bright);
    }
    .country-name:hover { color: var(--accent); }

    /* ── RISK BADGE ──────────────────────────────────────────────────────── */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 3px;
      font-family: var(--mono); font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .badge-CRITICAL { background: rgba(220,38,38,0.15); color: var(--critical); border: 1px solid rgba(220,38,38,0.3); }
    .badge-WARNING  { background: rgba(245,158,11,0.12); color: var(--warning);  border: 1px solid rgba(245,158,11,0.3); }
    .badge-ELEVATED { background: rgba(234,179,8,0.1);   color: var(--elevated); border: 1px solid rgba(234,179,8,0.3); }
    .badge-STABLE   { background: rgba(107,114,128,0.1); color: var(--stable);   border: 1px solid rgba(107,114,128,0.3); }

    /* ── DOMAIN BARS ─────────────────────────────────────────────────────── */
    .domain-list { display: flex; flex-direction: column; gap: 4px; min-width: 200px; }
    .domain-row {
      display: flex; align-items: center; gap: 8px;
    }
    .domain-name {
      font-family: var(--mono); font-size: 0.68rem; color: var(--dim);
      width: 90px; text-transform: uppercase; letter-spacing: 0.04em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .domain-bar-wrap {
      flex: 1; height: 6px; background: var(--border); border-radius: 3px;
      overflow: hidden; min-width: 80px; max-width: 160px;
    }
    .domain-bar {
      height: 100%; border-radius: 3px;
      transition: width 0.3s;
    }
    .domain-bar.critical { background: var(--critical); }
    .domain-bar.warning  { background: var(--warning); }
    .domain-bar.elevated { background: var(--elevated); }
    .domain-bar.stable   { background: var(--stable); }

    /* ── TREND ───────────────────────────────────────────────────────────── */
    .trend {
      font-family: var(--mono); font-size: 0.75rem; white-space: nowrap;
    }
    .trend.rising  { color: var(--critical); }
    .trend.flat    { color: var(--dim); }
    .trend.falling { color: var(--stable); }

    /* ── ACTIONS BAR ─────────────────────────────────────────────────────── */
    .actions-bar {
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex; gap: 1rem; flex-wrap: wrap;
    }

    /* ── UTILITIES ───────────────────────────────────────────────────────── */
    .loading-msg {
      font-family: var(--mono); font-size: 0.8rem; color: var(--dim);
      padding: 2rem; text-align: center;
    }
    .no-domains { color: var(--dim); font-size: 0.75rem; }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="/" class="nav-logo">SABIAN <span>INTELLIGENCE</span></a>
    <div class="nav-right">
      <span class="nav-badge"><span id="live-dot"></span>LIVE</span>
      <span class="nav-badge" id="nav-date"></span>
    </div>
  </nav>

  <!-- MODE BAR -->
  <div class="mode-bar">
    <a href="explore.html" class="mode-btn active">EXPLORE</a>
    <a href="intel.html" class="mode-btn">WATCHLIST</a>
    <a href="#" class="mode-btn" data-view="compare">COMPARE</a>
    <a href="#" class="mode-btn" data-view="regional">REGIONAL</a>
    <a href="#" class="mode-btn" data-view="domain">DOMAIN DRILL</a>
    <a href="#" class="mode-btn" data-view="portfolio">PORTFOLIO</a>
    <a href="#" class="mode-btn" data-view="patterns">PATTERNS</a>
  </div>

  <main>
    <!-- FILTER BAR -->
    <div class="filter-bar">
      <div class="filter-row">
        <div class="filter-group">
          <span class="filter-label">Level:</span>
          <select class="ctrl-select" id="filter-level" onchange="applyFilters()">
            <option value="">All</option>
            <option value="CRITICAL">Critical</option>
            <option value="WARNING">Warning</option>
            <option value="ELEVATED">Elevated</option>
            <option value="STABLE">Stable</option>
          </select>
        </div>
        <div class="filter-group">
          <span class="filter-label">Region:</span>
          <select class="ctrl-select" id="filter-region" onchange="applyFilters()">
            <option value="">All</option>
          </select>
        </div>
        <div class="filter-group">
          <span class="filter-label">Domain:</span>
          <select class="ctrl-select" id="filter-domain" onchange="applyFilters()">
            <option value="">Any Domain</option>
          </select>
        </div>
        <button class="ctrl-btn" onclick="clearFilters()">Clear Filters</button>
      </div>
    </div>

    <!-- SUMMARY BAR -->
    <div class="summary-bar">
      <div class="summary-cell">
        <div class="summary-value" id="sum-total">—</div>
        <div class="summary-label">COUNTRIES</div>
      </div>
      <div class="summary-cell">
        <div class="summary-value critical" id="sum-critical">—</div>
        <div class="summary-label"><span class="summary-icon critical">████</span>CRITICAL</div>
      </div>
      <div class="summary-cell">
        <div class="summary-value warning" id="sum-warning">—</div>
        <div class="summary-label"><span class="summary-icon warning">▓▓▓▓</span>WARNING</div>
      </div>
      <div class="summary-cell">
        <div class="summary-value elevated" id="sum-elevated">—</div>
        <div class="summary-label"><span class="summary-icon elevated">░░░░</span>ELEVATED</div>
      </div>
      <div class="summary-cell">
        <div class="summary-value stable" id="sum-stable">—</div>
        <div class="summary-label"><span class="summary-icon stable">────</span>STABLE</div>
      </div>
    </div>

    <!-- RESULTS HEADER -->
    <div class="section-hdr">
      <span class="section-title">RESULTS (<span id="results-count">0</span> COUNTRIES)</span>
      <div class="filter-group">
        <span class="filter-label">Sort:</span>
        <select class="ctrl-select" id="sort-by" onchange="applyFilters()">
          <option value="level">Level</option>
          <option value="score">Score</option>
          <option value="country">Country</option>
          <option value="trend">Trend</option>
        </select>
      </div>
    </div>

    <!-- RESULTS TABLE -->
    <div id="results-wrap">
      <div class="loading-msg">Loading data…</div>
    </div>

    <!-- ACTIONS BAR -->
    <div class="actions-bar">
      <button class="ctrl-btn" onclick="exportCSV()">Export CSV</button>
      <button class="ctrl-btn" onclick="exportPDF()">Export PDF</button>
      <button class="ctrl-btn" onclick="selectForCompare()">Select for Compare</button>
      <button class="ctrl-btn" onclick="addToPortfolio()">Add to Portfolio</button>
    </div>
  </main>

  <script>
    // ── SHARED STATE ────────────────────────────────────────────────────────
    window.SABIAN = window.SABIAN || {
      activeCountry: null,
      activeYear: null,
      activeDomain: null,
      activeRegion: null,
      compareList: [],
      portfolio: JSON.parse(localStorage.getItem('sabian_portfolio') || '[]'),
      filters: { level: '', region: '', domain: '' }
    };

    // ── GLOBALS ─────────────────────────────────────────────────────────────
    let allCountries = [];
    let allDomains = new Set();
    const API_BASE = '';

    // ── INIT ────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('nav-date').textContent = new Date().toISOString().slice(0, 10);
      loadData();
    });

    // ── LOAD DATA ───────────────────────────────────────────────────────────
    async function loadData() {
      try {
        const res = await fetch(`${API_BASE}/public-api/threats`);
        const data = await res.json();
        allCountries = data.countries || [];

        // Collect all unique domains and regions
        const allRegions = new Set();
        allCountries.forEach(c => {
          if (c.theater) allRegions.add(c.theater);
          (c.active_domains || []).forEach(d => {
            if (d.name) allDomains.add(d.name);
          });
        });

        // Populate region filter dropdown
        const regionSelect = document.getElementById('filter-region');
        [...allRegions].sort().forEach(r => {
          const opt = document.createElement('option');
          opt.value = r;
          opt.textContent = r;
          regionSelect.appendChild(opt);
        });

        // Populate domain filter dropdown
        const domainSelect = document.getElementById('filter-domain');
        [...allDomains].sort().forEach(d => {
          const opt = document.createElement('option');
          opt.value = d;
          opt.textContent = formatDomainName(d);
          domainSelect.appendChild(opt);
        });

        applyFilters();
      } catch (err) {
        document.getElementById('results-wrap').innerHTML =
          `<div class="loading-msg">Error loading data: ${err.message}</div>`;
      }
    }

    // ── FORMAT DOMAIN NAME ──────────────────────────────────────────────────
    function formatDomainName(name) {
      if (!name) return '';
      return name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    // ── GET LEVEL ORDER ─────────────────────────────────────────────────────
    function levelOrder(level) {
      const order = { CRITICAL: 0, WARNING: 1, ELEVATED: 2, STABLE: 3 };
      return order[level] ?? 4;
    }

    // ── GET TREND ORDER ─────────────────────────────────────────────────────
    function trendOrder(trajectory) {
      if (!trajectory) return 1;
      const t = trajectory.toUpperCase();
      if (t.includes('RISING') || t.includes('WORSENING') || t.includes('UP')) return 0;
      if (t.includes('FALLING') || t.includes('IMPROVING') || t.includes('DOWN')) return 2;
      return 1;
    }

    // ── APPLY FILTERS ───────────────────────────────────────────────────────
    function applyFilters() {
      const levelFilter = document.getElementById('filter-level').value;
      const regionFilter = document.getElementById('filter-region').value;
      const domainFilter = document.getElementById('filter-domain').value;
      const sortBy = document.getElementById('sort-by').value;

      // Store in shared state
      window.SABIAN.filters = { level: levelFilter, region: regionFilter, domain: domainFilter };

      let filtered = allCountries.filter(c => {
        if (levelFilter && c.risk_level !== levelFilter) return false;
        if (regionFilter && c.theater !== regionFilter) return false;
        if (domainFilter) {
          const domains = c.active_domains || [];
          if (!domains.some(d => d.name === domainFilter)) return false;
        }
        return true;
      });

      // Sort
      filtered.sort((a, b) => {
        if (sortBy === 'level') {
          const diff = levelOrder(a.risk_level) - levelOrder(b.risk_level);
          return diff !== 0 ? diff : (b.convergence_score || 0) - (a.convergence_score || 0);
        }
        if (sortBy === 'score') return (b.convergence_score || 0) - (a.convergence_score || 0);
        if (sortBy === 'country') return (a.country || '').localeCompare(b.country || '');
        if (sortBy === 'trend') return trendOrder(a.trajectory) - trendOrder(b.trajectory);
        return 0;
      });

      updateSummary(filtered);
      renderTable(filtered);
    }

    // ── UPDATE SUMMARY ──────────────────────────────────────────────────────
    function updateSummary(countries) {
      const counts = { CRITICAL: 0, WARNING: 0, ELEVATED: 0, STABLE: 0 };
      countries.forEach(c => {
        if (counts.hasOwnProperty(c.risk_level)) counts[c.risk_level]++;
      });
      document.getElementById('sum-total').textContent = countries.length;
      document.getElementById('sum-critical').textContent = counts.CRITICAL;
      document.getElementById('sum-warning').textContent = counts.WARNING;
      document.getElementById('sum-elevated').textContent = counts.ELEVATED;
      document.getElementById('sum-stable').textContent = counts.STABLE;
      document.getElementById('results-count').textContent = countries.length;
    }

    // ── RENDER TABLE ────────────────────────────────────────────────────────
    function renderTable(countries) {
      if (countries.length === 0) {
        document.getElementById('results-wrap').innerHTML =
          '<div class="loading-msg">No countries match filters.</div>';
        return;
      }

      let html = `<table class="results-table">
        <thead>
          <tr>
            <th>COUNTRY</th>
            <th>LEVEL</th>
            <th>ACTIVE DOMAINS</th>
            <th>TREND</th>
          </tr>
        </thead>
        <tbody>`;

      countries.forEach(c => {
        const domains = c.active_domains || [];
        const activeDomains = domains.filter(d => (d.score || 0) > 0);

        const trend = getTrend(c.trajectory);
        const domainHtml = renderDomains(activeDomains, c.risk_level);

        html += `<tr onclick="openCountry('${escapeHtml(c.country)}')">
          <td><span class="country-name">${escapeHtml(c.country)}</span></td>
          <td><span class="badge badge-${c.risk_level}">${c.risk_level}</span></td>
          <td>${domainHtml}</td>
          <td><span class="trend ${trend.class}">${trend.symbol} ${trend.label}</span></td>
        </tr>`;
      });

      html += '</tbody></table>';
      document.getElementById('results-wrap').innerHTML = html;
    }

    // ── RENDER DOMAINS ──────────────────────────────────────────────────────
    function renderDomains(domains, riskLevel) {
      if (!domains || domains.length === 0) {
        return '<span class="no-domains">—</span>';
      }

      const barClass = riskLevel ? riskLevel.toLowerCase() : 'stable';

      return `<div class="domain-list">${domains.map(d => {
        const score = d.score || 0;
        const width = Math.min(100, Math.max(5, score));
        return `<div class="domain-row" onclick="event.stopPropagation(); openDomain('${escapeHtml(d.name)}')">
          <span class="domain-name">${formatDomainName(d.name)}</span>
          <div class="domain-bar-wrap">
            <div class="domain-bar ${barClass}" style="width: ${width}%"></div>
          </div>
        </div>`;
      }).join('')}</div>`;
    }

    // ── GET TREND ───────────────────────────────────────────────────────────
    function getTrend(trajectory) {
      if (!trajectory) return { symbol: '──', label: 'Flat', class: 'flat' };
      const t = trajectory.toUpperCase();
      if (t.includes('RISING') || t.includes('WORSENING') || t.includes('UP')) {
        return { symbol: '▲', label: 'Rising', class: 'rising' };
      }
      if (t.includes('FALLING') || t.includes('IMPROVING') || t.includes('DOWN')) {
        return { symbol: '▼', label: 'Falling', class: 'falling' };
      }
      return { symbol: '──', label: 'Flat', class: 'flat' };
    }

    // ── ESCAPE HTML ─────────────────────────────────────────────────────────
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── CLEAR FILTERS ───────────────────────────────────────────────────────
    function clearFilters() {
      document.getElementById('filter-level').value = '';
      document.getElementById('filter-region').value = '';
      document.getElementById('filter-domain').value = '';
      applyFilters();
    }

    // ── NAVIGATION: OPEN COUNTRY ────────────────────────────────────────────
    function openCountry(country) {
      window.SABIAN.activeCountry = country;
      window.location.href = `intel.html?country=${encodeURIComponent(country)}`;
    }

    // ── NAVIGATION: OPEN DOMAIN ─────────────────────────────────────────────
    function openDomain(domain) {
      window.SABIAN.activeDomain = domain;
    }

    // ── EXPORT CSV ──────────────────────────────────────────────────────────
    function exportCSV() {
      const levelFilter = document.getElementById('filter-level').value;
      const regionFilter = document.getElementById('filter-region').value;
      const domainFilter = document.getElementById('filter-domain').value;

      let filtered = allCountries.filter(c => {
        if (levelFilter && c.risk_level !== levelFilter) return false;
        if (regionFilter && c.theater !== regionFilter) return false;
        if (domainFilter) {
          const domains = c.active_domains || [];
          if (!domains.some(d => d.name === domainFilter)) return false;
        }
        return true;
      });

      const headers = ['Country', 'Level', 'Score', 'Trajectory', 'Active Domains'];
      const rows = filtered.map(c => {
        const domains = (c.active_domains || [])
          .filter(d => (d.score || 0) > 0)
          .map(d => formatDomainName(d.name))
          .join('; ');
        return [
          c.country,
          c.risk_level,
          c.convergence_score || '',
          c.trajectory || '',
          domains
        ];
      });

      const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `sabian_explore_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }
