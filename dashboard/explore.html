<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabian — Explore Domain</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:     #050c1a;
      --panel:    #0a1428;
      --panel2:   #0d1a33;
      --border:   #152040;
      --accent:   #1a6fff;
      --dim:      #8aa0c0;
      --text:     #c8d8f0;
      --bright:   #e8f0ff;
      --critical: #dc2626;
      --warning:  #f59e0b;
      --elevated: #eab308;
      --stable:   #6b7280;
      --mono:     'Courier New', 'Consolas', monospace;
      --sans:     -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--navy);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── NAV ─────────────────────────────────────────────────────────────── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem;
      height: 52px;
      background: rgba(5,12,26,0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--mono); font-size: 1rem; font-weight: 700;
      color: var(--bright); letter-spacing: 0.14em; text-transform: uppercase;
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 1.5rem; }
    .nav-badge {
      font-family: var(--mono); font-size: 0.7rem; color: var(--dim);
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    #live-dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: var(--stable); margin-right: 6px;
      box-shadow: 0 0 6px var(--stable);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── MODE TABS ───────────────────────────────────────────────────────── */
    .mode-bar {
      position: fixed; top: 52px; left: 0; right: 0; z-index: 190;
      display: flex; align-items: center; gap: 0;
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      overflow-x: auto;
    }
    .mode-bar::-webkit-scrollbar { height: 0; }
    .mode-btn {
      background: none; border: none; cursor: pointer;
      padding: 0.75rem 1.25rem;
      font-family: var(--mono); font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--dim); border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
      text-decoration: none;
    }
    .mode-btn:hover { color: var(--text); }
    .mode-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── MAIN CONTENT ────────────────────────────────────────────────────── */
    main {
      padding-top: 110px;
      padding-bottom: 3rem;
      max-width: 1200px;
      margin: 0 auto;
      padding-left: 1.5rem;
      padding-right: 1.5rem;
    }

    /* ── DOMAIN SELECTOR (Landing State) ─────────────────────────────────── */
    .domain-selector {
      text-align: center;
      padding: 6rem 2rem;
    }
    .domain-selector-title {
      font-family: var(--mono); font-size: 1.2rem;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 2rem;
    }
    .domain-selector select {
      background: var(--panel); border: 2px solid var(--accent);
      color: var(--bright); padding: 16px 32px;
      border-radius: 4px;
      font-family: var(--mono); font-size: 1rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; outline: none;
    }
    .domain-selector select:hover { background: var(--panel2); }

    /* ── LEADERBOARD HEADER ──────────────────────────────────────────────── */
    .leaderboard-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
    }
    .leaderboard-title {
      font-family: var(--mono); font-size: 1.1rem;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--accent);
    }
    .leaderboard-meta {
      font-family: var(--mono); font-size: 0.75rem;
      color: var(--dim); letter-spacing: 0.08em;
    }
    .leaderboard-controls {
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    }
    .ctrl-input {
      background: var(--panel2); border: 1px solid var(--border);
      color: var(--text); padding: 8px 12px; border-radius: 4px;
      font-family: var(--mono); font-size: 0.8rem;
      letter-spacing: 0.06em; outline: none; width: 200px;
    }
    .ctrl-input:focus { border-color: var(--accent); }
    .ctrl-input::placeholder { color: var(--dim); text-transform: uppercase; }
    .ctrl-select {
      background: var(--panel2); border: 1px solid var(--border);
      color: var(--text); padding: 8px 12px; border-radius: 4px;
      font-family: var(--mono); font-size: 0.8rem;
      letter-spacing: 0.06em; cursor: pointer; outline: none;
    }
    .ctrl-select:hover { border-color: var(--accent); }
    .ctrl-btn {
      background: var(--panel2); border: 1px solid var(--border);
      color: var(--dim); padding: 8px 14px; border-radius: 4px;
      font-family: var(--mono); font-size: 0.72rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .ctrl-btn:hover { border-color: var(--accent); color: var(--text); }

    /* ── LEADERBOARD ROWS ────────────────────────────────────────────────── */
    .leaderboard {
      display: flex; flex-direction: column; gap: 2px;
    }
    .leaderboard-row {
      display: grid;
      grid-template-columns: 40px 180px 90px 1fr;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .leaderboard-row:hover { border-color: var(--accent); }
    .rank {
      font-family: var(--mono); font-size: 0.85rem;
      color: var(--dim); text-align: right;
    }
    .rank-top { color: var(--accent); font-weight: 700; }
    .country-name {
      font-weight: 600; color: var(--bright);
      font-size: 0.95rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 3px;
      font-family: var(--mono); font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      text-align: center;
    }
    .badge-CRITICAL { background: rgba(220,38,38,0.15); color: var(--critical); border: 1px solid rgba(220,38,38,0.3); }
    .badge-WARNING  { background: rgba(245,158,11,0.12); color: var(--warning);  border: 1px solid rgba(245,158,11,0.3); }
    .badge-ELEVATED { background: rgba(234,179,8,0.1);   color: var(--elevated); border: 1px solid rgba(234,179,8,0.3); }
    .badge-STABLE   { background: rgba(107,114,128,0.1); color: var(--stable);   border: 1px solid rgba(107,114,128,0.3); }

    /* ── MASSIVE BAR ─────────────────────────────────────────────────────── */
    .bar-container {
      display: flex; align-items: center; gap: 12px;
    }
    .bar-wrap {
      flex: 1; height: 24px; background: var(--border); border-radius: 4px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 4px;
      transition: width 0.4s ease-out;
    }
    .bar-fill.critical { background: linear-gradient(90deg, var(--critical), #ef4444); }
    .bar-fill.warning  { background: linear-gradient(90deg, var(--warning), #fbbf24); }
    .bar-fill.elevated { background: linear-gradient(90deg, var(--elevated), #facc15); }
    .bar-fill.stable   { background: linear-gradient(90deg, var(--stable), #9ca3af); }
    .bar-score {
      font-family: var(--mono); font-size: 0.9rem; font-weight: 700;
      color: var(--bright); min-width: 45px; text-align: right;
    }

    /* ── EXPORT BAR ──────────────────────────────────────────────────────── */
    .export-bar {
      margin-top: 2rem;
      display: flex; justify-content: flex-end;
    }

    /* ── UTILITIES ───────────────────────────────────────────────────────── */
    .hidden { display: none; }
    .loading-msg {
      font-family: var(--mono); font-size: 0.85rem; color: var(--dim);
      text-align: center; padding: 3rem;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="/" class="nav-logo">SABIAN <span>INTELLIGENCE</span></a>
    <div class="nav-right">
      <span class="nav-badge"><span id="live-dot"></span>LIVE</span>
      <span class="nav-badge" id="nav-date"></span>
    </div>
  </nav>

  <!-- MODE BAR -->
  <div class="mode-bar">
    <a href="explore.html" class="mode-btn active">EXPLORE</a>
    <a href="intel.html" class="mode-btn">WATCHLIST</a>
    <a href="intel.html" class="mode-btn">THREAT INTELLIGENCE</a>
    <a href="intel.html" class="mode-btn">FAMINE RISK</a>
  </div>

  <main>
    <!-- LANDING: SELECT DOMAIN -->
    <div id="domain-selector" class="domain-selector">
      <div class="domain-selector-title">SELECT A DOMAIN TO EXPLORE</div>
      <select id="domain-dropdown" onchange="selectDomain(this.value)">
        <option value="">CHOOSE DOMAIN</option>
      </select>
    </div>

    <!-- LEADERBOARD (hidden until domain selected) -->
    <div id="leaderboard-view" class="hidden">
      <div class="leaderboard-header">
        <div>
          <div class="leaderboard-title" id="leaderboard-title">—</div>
          <div class="leaderboard-meta"><span id="country-count">0</span> COUNTRIES RANKED</div>
        </div>
        <div class="leaderboard-controls">
          <input class="ctrl-input" id="search-input" type="text" placeholder="SEARCH" oninput="renderLeaderboard()">
          <select class="ctrl-select" id="filter-level" onchange="renderLeaderboard()">
            <option value="">ALL LEVELS</option>
            <option value="CRITICAL">CRITICAL</option>
            <option value="WARNING">WARNING</option>
            <option value="ELEVATED">ELEVATED</option>
            <option value="STABLE">STABLE</option>
          </select>
          <select class="ctrl-select" id="filter-region" onchange="renderLeaderboard()">
            <option value="">ALL REGIONS</option>
          </select>
          <select class="ctrl-select" id="domain-switch" onchange="selectDomain(this.value)"></select>
          <button class="ctrl-btn" onclick="clearFilters()">CLEAR</button>
        </div>
      </div>

      <div id="leaderboard" class="leaderboard">
        <div class="loading-msg">Loading...</div>
      </div>

      <div class="export-bar">
        <button class="ctrl-btn" onclick="exportCSV()">EXPORT CSV</button>
      </div>
    </div>
  </main>

  <script>
    // ── SHARED STATE ────────────────────────────────────────────────────────
    window.SABIAN = window.SABIAN || {
      activeCountry: null,
      activeYear: null,
      activeDomain: null,
      activeRegion: null,
      compareList: [],
      portfolio: JSON.parse(localStorage.getItem('sabian_portfolio') || '[]'),
      filters: { level: '', region: '', domain: '' }
    };

    // ── GLOBALS ─────────────────────────────────────────────────────────────
    let allCountries = [];
    let allDomains = [];
    let allRegions = [];
    let selectedDomain = '';

    // ── INIT ────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('nav-date').textContent = new Date().toISOString().slice(0, 10);
      loadData();
    });

    // ── LOAD DATA ───────────────────────────────────────────────────────────
    async function loadData() {
      try {
        const res = await fetch('/public-api/threats');
        const data = await res.json();
        allCountries = data.countries || [];

        const domainSet = new Set();
        const regionSet = new Set();
        allCountries.forEach(c => {
          if (c.theater) regionSet.add(c.theater);
          (c.active_domains || []).forEach(d => {
            if (d.name && (d.score || 0) > 0) domainSet.add(d.name);
          });
        });

        allDomains = [...domainSet].sort();
        allRegions = [...regionSet].sort();

        populateDropdowns();
      } catch (err) {
        document.getElementById('domain-selector').innerHTML =
          `<div class="loading-msg">Error loading data: ${err.message}</div>`;
      }
    }

    // ── POPULATE DROPDOWNS ──────────────────────────────────────────────────
    function populateDropdowns() {
      const mainDropdown = document.getElementById('domain-dropdown');
      const switchDropdown = document.getElementById('domain-switch');
      const regionDropdown = document.getElementById('filter-region');

      allDomains.forEach(d => {
        const opt1 = document.createElement('option');
        opt1.value = d;
        opt1.textContent = formatDomainName(d);
        mainDropdown.appendChild(opt1);

        const opt2 = document.createElement('option');
        opt2.value = d;
        opt2.textContent = formatDomainName(d);
        switchDropdown.appendChild(opt2);
      });

      allRegions.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r;
        opt.textContent = r;
        regionDropdown.appendChild(opt);
      });
    }

    // ── FORMAT DOMAIN NAME ──────────────────────────────────────────────────
    function formatDomainName(name) {
      if (!name) return '';
      return name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    // ── SELECT DOMAIN ───────────────────────────────────────────────────────
    function selectDomain(domain) {
      if (!domain) return;

      selectedDomain = domain;
      window.SABIAN.activeDomain = domain;

      document.getElementById('domain-selector').classList.add('hidden');
      document.getElementById('leaderboard-view').classList.remove('hidden');
      document.getElementById('leaderboard-title').textContent = formatDomainName(domain).toUpperCase();
      document.getElementById('domain-switch').value = domain;

      renderLeaderboard();
    }

    // ── GET DOMAIN SCORE ────────────────────────────────────────────────────
    function getDomainScore(country, domainName) {
      const domains = country.active_domains || [];
      const d = domains.find(x => x.name === domainName);
      return d ? (d.score || 0) : 0;
    }

    // ── RENDER LEADERBOARD ──────────────────────────────────────────────────
    function renderLeaderboard() {
      const search = (document.getElementById('search-input').value || '').toLowerCase().trim();
      const levelFilter = document.getElementById('filter-level').value;
      const regionFilter = document.getElementById('filter-region').value;

      let filtered = allCountries.filter(c => {
        const score = getDomainScore(c, selectedDomain);
        if (score <= 0) return false;
        if (search && !(c.country || '').toLowerCase().includes(search)) return false;
        if (levelFilter && c.risk_level !== levelFilter) return false;
        if (regionFilter && c.theater !== regionFilter) return false;
        return true;
      });

      filtered.sort((a, b) => getDomainScore(b, selectedDomain) - getDomainScore(a, selectedDomain));

      const maxScore = filtered.length > 0 ? getDomainScore(filtered[0], selectedDomain) : 100;

      document.getElementById('country-count').textContent = filtered.length;

      if (filtered.length === 0) {
        document.getElementById('leaderboard').innerHTML =
          '<div class="loading-msg">NO COUNTRIES MATCH FILTERS</div>';
        return;
      }

      let html = '';
      filtered.forEach((c, i) => {
        const rank = i + 1;
        const score = getDomainScore(c, selectedDomain);
        const width = maxScore > 0 ? (score / maxScore) * 100 : 0;
        const barClass = c.risk_level ? c.risk_level.toLowerCase() : 'stable';
        const rankClass = rank <= 3 ? 'rank rank-top' : 'rank';

        html += `
          <div class="leaderboard-row" onclick="openCountry('${escapeHtml(c.country)}')">
            <div class="${rankClass}">${rank}</div>
            <div class="country-name">${escapeHtml(c.country)}</div>
            <span class="badge badge-${c.risk_level}">${c.risk_level}</span>
            <div class="bar-container">
              <div class="bar-wrap">
                <div class="bar-fill ${barClass}" style="width: ${width}%"></div>
              </div>
              <div class="bar-score">${score}</div>
            </div>
          </div>
        `;
      });

      document.getElementById('leaderboard').innerHTML = html;
    }

    // ── CLEAR FILTERS ───────────────────────────────────────────────────────
    function clearFilters() {
      document.getElementById('search-input').value = '';
      document.getElementById('filter-level').value = '';
      document.getElementById('filter-region').value = '';
      renderLeaderboard();
    }

    // ── OPEN COUNTRY ────────────────────────────────────────────────────────
    function openCountry(country) {
      window.SABIAN.activeCountry = country;
      window.location.href = `intel.html?country=${encodeURIComponent(country)}`;
    }

    // ── ESCAPE HTML ─────────────────────────────────────────────────────────
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── EXPORT CSV ──────────────────────────────────────────────────────────
    function exportCSV() {
      const search = (document.getElementById('search-input').value || '').toLowerCase().trim();
      const levelFilter = document.getElementById('filter-level').value;
      const regionFilter = document.getElementById('filter-region').value;

      let filtered = allCountries.filter(c => {
        const score = getDomainScore(c, selectedDomain);
        if (score <= 0) return false;
        if (search && !(c.country || '').toLowerCase().includes(search)) return false;
        if (levelFilter && c.risk_level !== levelFilter) return false;
        if (regionFilter && c.theater !== regionFilter) return false;
        return true;
      });

      filtered.sort((a, b) => getDomainScore(b, selectedDomain) - getDomainScore(a, selectedDomain));

      const timestamp = new Date().toISOString();
      const dataRows = filtered.map((c, i) =>
        `${i + 1},${c.country},${c.risk_level},${getDomainScore(c, selectedDomain)}`
      ).join('\n');

      const csv = `# SABIAN INTELLIGENCE
# DOMAIN: ${formatDomainName(selectedDomain).toUpperCase()}
# GENERATED: ${timestamp}
Rank,Country,Level,Score
${dataRows}`;

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `sabian_${selectedDomain}_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>

</body>
</html>
